name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # Build runs on GitHub-hosted runner (fast, has Node/Java caches)
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build backend JAR
        run: mvn -B package -DskipTests --file backend/pom.xml

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          retention-days: 1

  # Deploy runs on the self-hosted runner installed on the PUCP VM — no SSH needed.
  deploy:
    name: Deploy to PUCP VM
    needs: build
    runs-on: [self-hosted, pucp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Deploy frontend
        run: rsync -avz --delete dist/ /var/www/luggage-manager/

      - name: Deploy backend JAR
        run: cp backend/target/backend-*.jar /opt/luggage-manager/app.jar

      - name: Write environment file and restart service
        env:
          DB_PASSWORD: ${{ secrets.PUCP_DB_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.PUCP_CORS_ALLOWED_ORIGINS }}
        run: |
          cat > /opt/luggage-manager/.env.tmp << EOF
          SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/tasfb2b?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME=luggage
          SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
          CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8081
          EOF
          mv /opt/luggage-manager/.env.tmp /opt/luggage-manager/.env
          chmod 600 /opt/luggage-manager/.env
          sudo systemctl restart luggage-manager
          echo "Waiting for service to start..."
          for i in $(seq 1 12); do
            sleep 5
            if systemctl is-active --quiet luggage-manager; then
              echo "Service is running after $((i * 5))s"
              exit 0
            fi
            echo "  attempt $i/12..."
          done
          echo "Service failed to start after 60s:"
          sudo journalctl -u luggage-manager -n 50
          exit 1
