name: Provision PUCP VM (run once)

# Manual trigger only — run this ONE TIME to set up the new university VM.
# After it completes successfully, use the regular ci-cd.yml for all future deploys.
on:
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  APP_DIR: /opt/luggage-manager
  WEB_DIR: /var/www/luggage-manager
  APP_USER: 1inf54.981.4d
  DB_NAME: tasfb2b

jobs:
  # ─── 1. Build artifacts ───────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build backend JAR
        run: mvn -B package -DskipTests --file backend/pom.xml

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

      - name: Upload backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/backend-*.jar
          retention-days: 1

  # ─── 2. Bootstrap VM (password auth → instala SSH key) ───────────────────
  bootstrap:
    name: Bootstrap SSH key
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      # Generate a fresh ED25519 key pair just for this VM
      - name: Generate deploy key pair
        run: |
          ssh-keygen -t ed25519 -C "github-actions-pucp" -f /tmp/deploy_key -N ""
          echo "DEPLOY_PUBKEY=$(cat /tmp/deploy_key.pub)" >> $GITHUB_ENV

      # Use password auth (sshpass) to push the public key into the VM
      - name: Install public key on VM
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" \
            "mkdir -p ~/.ssh && chmod 700 ~/.ssh && \
             echo '${{ env.DEPLOY_PUBKEY }}' >> ~/.ssh/authorized_keys && \
             chmod 600 ~/.ssh/authorized_keys"

      # Save the private key as an output so the next job can use it.
      # We write it to a GitHub Actions artifact (encrypted at rest by GitHub).
      - name: Save private key as artifact
        run: |
          cp /tmp/deploy_key /tmp/pucp_deploy_key
        # NOTE: After this workflow succeeds, copy the private key content
        # from the logs and add it as secret PUCP_VM_SSH_KEY in GitHub.
        # Then delete the PUCP_VM_PASSWORD secret — it's no longer needed.

      - name: Print private key (copy → GitHub secret PUCP_VM_SSH_KEY)
        run: |
          echo "::warning::Copy the key below and save it as GitHub secret PUCP_VM_SSH_KEY"
          echo "---BEGIN PRIVATE KEY---"
          cat /tmp/deploy_key
          echo "---END PRIVATE KEY---"

  # ─── 3. Provision packages, MySQL, systemd, nginx ─────────────────────────
  provision:
    name: Provision VM
    runs-on: ubuntu-latest
    needs: bootstrap

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Install packages on VM
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo apt-get update -q
              sudo apt-get install -y -q openjdk-21-jre-headless mysql-server rsync
              sudo systemctl enable mysql
              sudo systemctl start mysql
            "

      - name: Create MySQL database and user
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
          DB_PASS: ${{ secrets.PUCP_DB_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo mysql -e \"
                CREATE DATABASE IF NOT EXISTS ${{ env.DB_NAME }}
                  CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                CREATE USER IF NOT EXISTS 'luggage'@'localhost'
                  IDENTIFIED BY '$DB_PASS';
                GRANT ALL PRIVILEGES ON ${{ env.DB_NAME }}.* TO 'luggage'@'localhost';
                FLUSH PRIVILEGES;
              \"
            "

      - name: Create app directories
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo mkdir -p ${{ env.APP_DIR }} ${{ env.WEB_DIR }}
              sudo chown ${{ env.APP_USER }}:${{ env.APP_USER }} \
                ${{ env.APP_DIR }} ${{ env.WEB_DIR }}
            "

      - name: Write .env file
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
          DB_PASS: ${{ secrets.PUCP_DB_PASSWORD }}
          CORS_ORIGINS: ${{ secrets.PUCP_CORS_ALLOWED_ORIGINS }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              cat > ${{ env.APP_DIR }}/.env << 'EOF'
          SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/${{ env.DB_NAME }}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME=luggage
          SPRING_DATASOURCE_PASSWORD=$DB_PASS
          SPRING_PROFILES_ACTIVE=prod
          SERVER_PORT=8081
          CORS_ALLOWED_ORIGINS=$CORS_ORIGINS
          EOF
              chmod 600 ${{ env.APP_DIR }}/.env
            "

      - name: Install systemd service
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo tee /etc/systemd/system/luggage-manager.service > /dev/null << 'EOF'
          [Unit]
          Description=Luggage Manager - Spring Boot backend
          After=network.target mysql.service

          [Service]
          Type=simple
          User=${{ env.APP_USER }}
          WorkingDirectory=${{ env.APP_DIR }}
          EnvironmentFile=${{ env.APP_DIR }}/.env
          ExecStart=/usr/bin/java -jar ${{ env.APP_DIR }}/app.jar
          Restart=on-failure
          RestartSec=10
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=luggage-manager

          [Install]
          WantedBy=multi-user.target
          EOF

              sudo tee /etc/sudoers.d/luggage-manager > /dev/null << 'EOF'
          ${{ env.APP_USER }} ALL=(ALL) NOPASSWD: /bin/systemctl restart luggage-manager, /bin/systemctl start luggage-manager, /bin/systemctl stop luggage-manager, /bin/systemctl status luggage-manager, /bin/journalctl -u luggage-manager *
          EOF
              sudo chmod 440 /etc/sudoers.d/luggage-manager

              sudo systemctl daemon-reload
              sudo systemctl enable luggage-manager
            "

      - name: Configure Nginx
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo tee /etc/nginx/sites-available/luggage-manager > /dev/null << 'EOF'
          server {
              listen 80;
              server_name 1inf54-981-4d.inf.pucp.edu.pe 200.16.7.144;

              root ${{ env.WEB_DIR }};
              index index.html;

              location / {
                  try_files \$uri \$uri/ /index.html;
              }

              location /api/ {
                  proxy_pass         http://127.0.0.1:8081/api/;
                  proxy_http_version 1.1;
                  proxy_set_header   Host              \$host;
                  proxy_set_header   X-Real-IP         \$remote_addr;
                  proxy_set_header   X-Forwarded-For   \$proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto \$scheme;
                  proxy_connect_timeout 60s;
                  proxy_read_timeout    300s;
              }
          }
          EOF

              sudo rm -f /etc/nginx/sites-enabled/default
              sudo ln -sf /etc/nginx/sites-available/luggage-manager \
                /etc/nginx/sites-enabled/luggage-manager
              sudo nginx -t
              sudo systemctl reload nginx
            "

  # ─── 4. First deploy ──────────────────────────────────────────────────────
  first-deploy:
    name: First deploy
    runs-on: ubuntu-latest
    needs: provision

    steps:
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Install sshpass + rsync
        run: sudo apt-get install -y sshpass rsync

      - name: Sync frontend
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ "$VM_USER@$VM_HOST:${{ env.WEB_DIR }}/"

      - name: Upload backend JAR
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" scp \
            -o StrictHostKeyChecking=no \
            backend/target/backend-*.jar \
            "$VM_USER@$VM_HOST:${{ env.APP_DIR }}/app.jar"

      - name: Start service and verify
        env:
          VM_HOST: ${{ secrets.PUCP_VM_HOST }}
          VM_USER: ${{ secrets.PUCP_VM_USER }}
          VM_PASS: ${{ secrets.PUCP_VM_PASSWORD }}
        run: |
          sshpass -p "$VM_PASS" ssh -o StrictHostKeyChecking=no \
            "$VM_USER@$VM_HOST" "
              sudo systemctl restart luggage-manager
              echo 'Waiting for service...'
              for i in \$(seq 1 12); do
                sleep 5
                if sudo systemctl is-active --quiet luggage-manager; then
                  echo \"Service running after \$((i * 5))s\"
                  exit 0
                fi
                echo \"  attempt \$i/12...\"
              done
              echo 'Service failed to start:'
              sudo journalctl -u luggage-manager -n 50
              exit 1
            "

      - name: Smoke test
        run: |
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://${{ secrets.PUCP_VM_HOST }}")
          echo "Frontend HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Smoke test failed — expected 200, got $HTTP_CODE"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### Provision complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- App running at http://${{ secrets.PUCP_VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next step:** Copy the private key printed in the *Bootstrap SSH key* job" >> $GITHUB_STEP_SUMMARY
          echo "  and save it as GitHub secret \`PUCP_VM_SSH_KEY\`." >> $GITHUB_STEP_SUMMARY
          echo "- **Then:** Remove secret \`PUCP_VM_PASSWORD\` — it is no longer needed." >> $GITHUB_STEP_SUMMARY
          echo "- **Data migration:** when ready, dump from old EC2 and import to this VM." >> $GITHUB_STEP_SUMMARY
